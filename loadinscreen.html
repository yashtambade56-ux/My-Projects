<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loader</title>
  <style>
    /* Center the loader cleanly on the screen */
    body {
      background-color: #090909;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    .absolute {
      position: absolute;
    }

    .inline-block {
      display: inline-block;
    }

    .loader {
      display: flex;
      gap: 0.5em; 
      align-items: center;
    }

    .dash {
      animation: dashArray 2s ease-in-out infinite,
                 dashOffset 2s linear infinite;
    }

    @keyframes dashArray {
      0% {
        stroke-dasharray: 0 1 359 0;
      }
      50% {
        stroke-dasharray: 0 359 1 0;
      }
      100% {
        stroke-dasharray: 359 1 0 0;
      }
    }

    @keyframes dashOffset {
      0% {
        stroke-dashoffset: 365;
      }
      100% {
        stroke-dashoffset: 5;
      }
    }
  </style>
</head>
<body>

<div id="loader" class="loader">
  <svg height="0" width="0" viewBox="0 0 64 64" class="absolute">
    <defs xmlns="http://www.w3.org/2000/svg">
      <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="62" x1="0" id="grad-purple-blue">
        <stop stop-color="#973BED"></stop>
        <stop stop-color="#007CFF" offset="1"></stop>
      </linearGradient>
      <linearGradient gradientUnits="userSpaceOnUse" y2="0" x2="0" y1="64" x1="0" id="grad-spinning">
        <stop stop-color="#FFC800"></stop>
        <stop stop-color="#F0F" offset="1"></stop>
        <animateTransform repeatCount="indefinite" keySplines=".42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1" keyTimes="0; 0.125; 0.25; 0.375; 0.5; 0.625; 0.75; 0.875; 1" dur="8s" values="0 32 32;-270 32 32;-270 32 32;-540 32 32;-540 32 32;-810 32 32;-810 32 32;-1080 32 32;-1080 32 32" type="rotate" attributeName="gradientTransform"></animateTransform>
      </linearGradient>
      <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="62" x1="0" id="grad-cyan-green">
        <stop stop-color="#00E0ED"></stop>
        <stop stop-color="#00DA72" offset="1"></stop>
      </linearGradient>
    </defs>
  </svg>

  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64" height="64" width="64" class="inline-block">
    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="8" stroke="url(#grad-purple-blue)" d="M 54.722656,3.9726563 A 2.0002,2.0002 0 0 0 54.941406,4 h 5.007813 C 58.955121,17.046124 49.099667,27.677057 36.121094,29.580078 a 2.0002,2.0002 0 0 0 -1.708985,1.978516 V 60 H 29.587891 V 31.558594 A 2.0002,2.0002 0 0 0 27.878906,29.580078 C 14.900333,27.677057 5.0448787,17.046124 4.0507812,4 H 9.28125 c 1.231666,11.63657 10.984383,20.554048 22.6875,20.734375 a 2.0002,2.0002 0 0 0 0.02344,0 c 11.806958,0.04283 21.70649,-9.003371 22.730469,-20.7617187 z" class="dash" pathLength="360"></path>
  </svg>

  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64" height="64" width="64" class="inline-block">
    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="8" stroke="url(#grad-spinning)" d="M 8,56 L 32,8 L 56,56 M 16,40 L 48,40" class="dash" pathLength="360"></path>
  </svg>

  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64" height="64" width="64" class="inline-block">
    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="8" stroke="url(#grad-purple-blue)" d="M 52,16 C 52,6 12,6 12,22 C 12,38 52,30 52,46 C 52,60 12,58 12,46" class="dash" pathLength="360"></path>
  </svg>

  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64" height="64" width="64" class="inline-block">
    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="8" stroke="url(#grad-cyan-green)" d="M 12,6 V 58 M 52,6 V 58 M 12,32 H 52" class="dash" pathLength="360"></path>
  </svg>
</div>
</div>

<script>
  // Keep the loading screen visible for ~3.5 seconds, then proceed.
  setTimeout(() => {
    const main = document.getElementById('main-content');
    const loader = document.getElementById('loader');
    if (main) {
      loader.style.display = 'none';
      main.style.display = '';
    } else {
      // If no main content in this file, navigate to index.html
      window.location.href = 'index.html';
    }
  }, 3500);
</script>
</body>
</html>
